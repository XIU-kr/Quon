<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Background -->
  <rect width="240" height="240" fill="#2C3E50" rx="20"/>
  
  <!-- QR Code style pattern -->
  <g fill="#51A273">
    <!-- Corner squares -->
    <rect x="30" y="30" width="50" height="50" rx="8"/>
    <rect x="160" y="30" width="50" height="50" rx="8"/>
    <rect x="30" y="160" width="50" height="50" rx="8"/>
    
    <!-- Center smile face -->
    <circle cx="120" cy="120" r="35" opacity="0.9"/>
    <circle cx="110" cy="110" r="4" fill="#2C3E50"/>
    <circle cx="130" cy="110" r="4" fill="#2C3E50"/>
    <path d="M 105 130 Q 120 140 135 130" stroke="#2C3E50" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Decorative QR elements -->
    <rect x="95" y="40" width="15" height="15" rx="3"/>
    <rect x="130" y="40" width="15" height="15" rx="3"/>
    <rect x="40" y="95" width="15" height="15" rx="3"/>
    <rect x="40" y="130" width="15" height="15" rx="3"/>
    <rect x="185" y="95" width="15" height="15" rx="3"/>
    <rect x="185" y="130" width="15" height="15" rx="3"/>
    <rect x="95" y="185" width="15" height="15" rx="3"/>
    <rect x="130" y="185" width="15" height="15" rx="3"/>
    
    <!-- Additional pattern elements -->
    <rect x="165" y="165" width="10" height="10" rx="2"/>
    <rect x="180" y="165" width="10" height="10" rx="2"/>
    <rect x="165" y="180" width="10" height="10" rx="2"/>
    <rect x="180" y="180" width="10" height="10" rx="2"/>
  </g>
</svg>
