<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Quon</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#d4a016">
    <link rel="icon" type="image/svg+xml" href="/assets/images/brand.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/icon-192.png">
    <link rel="icon" type="image/webp" href="/assets/images/quon.webp">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #07070b;
            color: #e4e4ec;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", Pretendard, system-ui, sans-serif;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 70% 40%, rgba(212, 160, 22, 0.10), transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(45, 212, 168, 0.05), transparent 60%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(#1e1e30 1px, transparent 1px),
                linear-gradient(90deg, #1e1e30 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.35;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 70%);
            pointer-events: none;
        }
        main {
            position: relative;
            text-align: center;
            max-width: 480px;
            z-index: 1;
        }
        .logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(212, 160, 22, 0.35));
        }
        .code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #e4e4ec 0%, #d4a016 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5f5fa;
            margin-bottom: 0.75rem;
        }
        p {
            color: #a8a8c0;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        p.en {
            color: #6a6a82;
            font-size: 0.88rem;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            border-radius: 999px;
            background: #d4a016;
            color: #07070b;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(212, 160, 22, 0.4);
        }
    </style>
</head>
<body>
    <main>
        <img src="/assets/images/brand.svg" alt="Quon" class="logo" onerror="this.onerror=null;this.src='/assets/images/quon.webp';">
        <div class="code">404</div>
        <h1>페이지를 찾을 수 없습니다</h1>
        <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>주소를 다시 확인해 주세요.</p>
        <p class="en">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn">홈으로 돌아가기</a>
    </main>
</body>
</html>
