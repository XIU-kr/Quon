<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Quon</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#1aad6c">
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/webp" href="/quon.webp">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #07070b;
            color: #e4e4ec;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard Variable", Pretendard, system-ui, sans-serif;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(26, 173, 108, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(45, 212, 168, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        main {
            position: relative;
            text-align: center;
            max-width: 480px;
        }
        .logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 2rem;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(26, 173, 108, 0.35));
        }
        .code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #22c478, #1aad6c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5f5fa;
            margin-bottom: 0.75rem;
        }
        p {
            color: #a8a8c0;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        p.en {
            color: #6a6a82;
            font-size: 0.88rem;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.85rem 2rem;
            border-radius: 999px;
            background: #1aad6c;
            color: #07070b;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(26, 173, 108, 0.4);
        }
    </style>
</head>
<body>
    <main>
        <img src="/quon.webp" alt="Quon" class="logo">
        <div class="code">404</div>
        <h1>페이지를 찾을 수 없습니다</h1>
        <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>주소를 다시 확인해 주세요.</p>
        <p class="en">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn">홈으로 돌아가기</a>
    </main>
</body>
</html>
