<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐알코드 만들기 - 맞춤형 QR 코드 생성기</title>
    <meta name="description" content="다양한 용도의 큐알코드를 만들어보세요. 인터넷 주소, 문자, 연락처, 이메일, 전화, 위치, 와이파이 등">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 큐알코드 만들기</h1>
            <p class="subtitle">원하는 정보를 담은 맞춤형 큐알코드를 쉽게 만들어보세요</p>
        </header>

        <main>
            <div class="content-wrapper">
                <!-- Left Panel: QR Code Type Selection and Content -->
                <div class="input-panel">
                    <div class="section">
                        <h2>코드 종류 선택</h2>
                        <div class="type-selector">
                            <button class="type-btn active" data-type="url">
                                <span class="icon">🔗</span>
                                <span>인터넷 주소</span>
                            </button>
                            <button class="type-btn" data-type="text">
                                <span class="icon">📝</span>
                                <span>문자</span>
                            </button>
                            <button class="type-btn" data-type="vcard">
                                <span class="icon">👤</span>
                                <span>연락처</span>
                            </button>
                            <button class="type-btn" data-type="email">
                                <span class="icon">✉️</span>
                                <span>이메일</span>
                            </button>
                            <button class="type-btn" data-type="tel">
                                <span class="icon">📞</span>
                                <span>전화</span>
                            </button>
                            <button class="type-btn" data-type="geo">
                                <span class="icon">📍</span>
                                <span>위치</span>
                            </button>
                            <button class="type-btn" data-type="wifi">
                                <span class="icon">📶</span>
                                <span>와이파이</span>
                            </button>
                        </div>
                    </div>

                    <!-- Content Forms -->
                    <div class="section">
                        <h2>내용 입력</h2>
                        
                        <!-- URL Form -->
                        <div class="form-container active" id="form-url">
                            <div class="form-group">
                                <label for="url-input">인터넷 주소</label>
                                <input type="url" id="url-input" placeholder="https://example.com" class="input-field">
                            </div>
                        </div>

                        <!-- Text Form -->
                        <div class="form-container" id="form-text">
                            <div class="form-group">
                                <label for="text-input">문자 내용</label>
                                <textarea id="text-input" rows="4" placeholder="여기에 문자를 입력하세요..." class="input-field"></textarea>
                            </div>
                        </div>

                        <!-- V-Card Form -->
                        <div class="form-container" id="form-vcard">
                            <div class="form-group">
                                <label for="vcard-name">이름</label>
                                <input type="text" id="vcard-name" placeholder="홍길동" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="vcard-org">회사/단체</label>
                                <input type="text" id="vcard-org" placeholder="회사명" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="vcard-tel">전화번호</label>
                                <input type="tel" id="vcard-tel" placeholder="01012345678" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="vcard-email">이메일</label>
                                <input type="email" id="vcard-email" placeholder="email@example.com" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="vcard-url">웹사이트</label>
                                <input type="url" id="vcard-url" placeholder="https://example.com" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="vcard-address">주소</label>
                                <div class="address-search-container">
                                    <input type="text" id="vcard-address-search" placeholder="주소 검색 (예: 서울시청)" class="input-field">
                                    <button type="button" id="vcard-search-btn" class="btn-search">🔍 검색</button>
                                </div>
                                <div id="vcard-search-results" class="search-results" style="display: none;"></div>
                                <textarea id="vcard-address" rows="2" placeholder="주소를 직접 입력하거나 위에서 검색하세요" class="input-field" style="margin-top: 10px;"></textarea>
                            </div>
                        </div>

                        <!-- Email Form -->
                        <div class="form-container" id="form-email">
                            <div class="form-group">
                                <label for="email-to">받는 사람 이메일</label>
                                <input type="email" id="email-to" placeholder="recipient@example.com" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="email-subject">제목</label>
                                <input type="text" id="email-subject" placeholder="이메일 제목" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="email-body">내용</label>
                                <textarea id="email-body" rows="4" placeholder="이메일 내용..." class="input-field"></textarea>
                            </div>
                        </div>

                        <!-- Tel Form -->
                        <div class="form-container" id="form-tel">
                            <div class="form-group">
                                <label for="tel-number">전화번호</label>
                                <input type="tel" id="tel-number" placeholder="01012345678" class="input-field">
                            </div>
                        </div>

                        <!-- Geo Form -->
                        <div class="form-container" id="form-geo">
                            <div class="form-group">
                                <label for="geo-address-search">주소 검색</label>
                                <div class="address-search-container">
                                    <input type="text" id="geo-address-search" placeholder="장소 이름이나 주소 입력 (예: 서울시청)" class="input-field">
                                    <button type="button" id="geo-search-btn" class="btn-search">🔍 검색</button>
                                </div>
                                <div id="geo-search-results" class="search-results" style="display: none;"></div>
                            </div>
                            <div class="form-group">
                                <label for="geo-lat">위도</label>
                                <input type="number" id="geo-lat" placeholder="37.5665" class="input-field" step="0.000001" min="-90" max="90">
                                <small>위도 값 (-90 ~ 90)</small>
                            </div>
                            <div class="form-group">
                                <label for="geo-lon">경도</label>
                                <input type="number" id="geo-lon" placeholder="126.9780" class="input-field" step="0.000001" min="-180" max="180">
                                <small>경도 값 (-180 ~ 180)</small>
                            </div>
                            <div class="form-group">
                                <button id="get-current-location" class="btn-secondary" style="width: 100%;">
                                    📍 현재 내 위치 사용
                                </button>
                                <small>또는 위에서 주소를 검색하거나 좌표를 직접 입력하세요</small>
                            </div>
                        </div>

                        <!-- Wi-Fi Form -->
                        <div class="form-container" id="form-wifi">
                            <div class="form-group">
                                <label for="wifi-ssid">네트워크 이름 (SSID)</label>
                                <input type="text" id="wifi-ssid" placeholder="MyWiFi" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="wifi-password">비밀번호</label>
                                <input type="text" id="wifi-password" placeholder="password123" class="input-field">
                            </div>
                            <div class="form-group">
                                <label for="wifi-encryption">보안 방식</label>
                                <select id="wifi-encryption" class="input-field">
                                    <option value="WPA">WPA/WPA2</option>
                                    <option value="WEP">WEP</option>
                                    <option value="nopass">없음</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="wifi-hidden">
                                    <span>숨김 네트워크</span>
                                </label>
                            </div>
                        </div>

                        <button id="generate-btn" class="btn-primary">큐알코드 만들기</button>
                    </div>

                    <!-- Customization Options -->
                    <div class="section">
                        <h2>디자인 꾸미기</h2>
                        
                        <div class="form-group">
                            <label for="dots-type">점 모양</label>
                            <select id="dots-type" class="input-field">
                                <option value="rounded">둥근 사각형</option>
                                <option value="dots">원형</option>
                                <option value="classy">세련된</option>
                                <option value="classy-rounded">세련된 둥근형</option>
                                <option value="square">사각형</option>
                                <option value="extra-rounded">매우 둥근</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="corner-square-type">모서리 사각형 모양</label>
                            <select id="corner-square-type" class="input-field">
                                <option value="dot">원형</option>
                                <option value="square">사각형</option>
                                <option value="extra-rounded">매우 둥근</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="corner-dot-type">모서리 점 모양</label>
                            <select id="corner-dot-type" class="input-field">
                                <option value="dot">원형</option>
                                <option value="square">사각형</option>
                            </select>
                        </div>

                        <div class="color-row">
                            <div class="form-group">
                                <label for="dots-color">코드 색상</label>
                                <input type="color" id="dots-color" value="#51A273" class="color-input">
                            </div>
                            <div class="form-group">
                                <label for="background-color">배경 색상</label>
                                <input type="color" id="background-color" value="#ffffff" class="color-input">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="logo-upload">로고 이미지 (선택)</label>
                            <input type="file" id="logo-upload" accept="image/*" class="input-field">
                            <small>코드 중앙에 넣을 로고를 올려주세요</small>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: QR Code Preview -->
                <div class="preview-panel">
                    <div class="section preview-section">
                        <h2>미리보기</h2>
                        <div id="qr-code-container"></div>
                        <div class="preview-actions">
                            <button id="download-png" class="btn-secondary" disabled>PNG 다운로드</button>
                            <button id="download-svg" class="btn-secondary" disabled>SVG 다운로드</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Made with ❤️ by <a href="https://github.com/sn0wmankr" target="_blank" rel="noopener noreferrer">sn0wmankr</a></p>
            <p class="footer-links">
                <a href="https://github.com/sn0wmankr/QRCodeGenerator-KR" target="_blank" rel="noopener noreferrer">GitHub Repository</a>
            </p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="script.js"></script>
</body>
</html>
